<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>설문 결과 — RED&BLUE</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="/rnb_logo.ico">
</head>
<body class="result-page">
  <nav class="navbar">
    <a href="index.html" class="nav-logo">
      <img src="images/rnb_logo.png" alt="RED&BLUE 로고" />
      <span class="nav-logo-text">RED&BLUE</span>
    </a>
    <button class="nav-profile-icon hidden" id="nav-profile-icon">👤</button>
  </nav>

  <div class="result-page-wrap">
    <p class="result-label" id="result-label">결과 불러오는 중…</p>

    <div class="result-box">
      <div class="result-compass-wrap">
        <span class="compass-edge-label">권위주의</span>
        <div class="compass-middle-row">
          <span class="compass-edge-label">진보</span>
          <div class="compass" id="compass">
            <div class="compass-line h"></div>
            <div class="compass-line v"></div>
            <div class="compass-dot" id="compass-dot"></div>
          </div>
          <span class="compass-edge-label">보수</span>
        </div>
        <span class="compass-edge-label">자유주의</span>
      </div>
    </div>

    <div class="result-btn-row">
        <a href="match.html" class="btn-primary">매칭 시작하기</a>
        <a href="quiz.html" class="btn-primary result-retry-btn">다시 하기</a>
    </div>
  </div>

  <div class="profile-modal-overlay hidden" id="profile-modal-overlay">
    <div class="profile-modal">
      <button class="modal-close" id="modal-close">✕</button>
      <div class="profile-modal-avatar" id="modal-avatar">?</div>
      <div class="profile-modal-name" id="modal-nickname">닉네임</div>
      <div class="form-group">
        <label>닉네임</label>
        <input type="text" id="modal-edit-nickname" />
      </div>
      <div class="form-group">
        <label>나이</label>
        <input type="number" id="modal-edit-age" />
      </div>
      <div class="form-group">
        <label>성별</label>
        <select id="modal-edit-gender">
          <option value="male">남성</option>
          <option value="female">여성</option>
          <option value="other">기타</option>
        </select>
      </div>
      <div class="form-group">
        <label>한줄소개</label>
        <input type="text" id="modal-edit-bio" />
      </div>
      <button class="btn-primary full" id="modal-btn-save">저장하기</button>
      <button class="btn-outline full" id="modal-btn-logout">로그아웃</button>
    </div>
  </div>

  <script type="module" src="js/result.js"></script>
</body>
</html>
