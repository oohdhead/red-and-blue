<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>매칭 — RED&BLUE</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="match-page">
    <nav class="navbar">
    <a href="index.html" class="nav-logo">
        <img src="images/rnb_logo.png" alt="RED&BLUE 로고" />
        <span class="nav-logo-text">RED&BLUE</span>
    </a>
    <a href="profile.html" class="nav-profile-icon hidden" id="nav-profile-icon">👤</a>
    </nav>

    <div class="match-mode" id="match-mode-selector">
      <h2>어떤 사람을 만나고 싶나요?</h2>
      <div class="mode-cards">
        <button class="mode-card" data-mode="similar">
          <img src="images/similar.png" alt="비슷한 성향">
          <strong>비슷한 성향</strong>
          <p>나와 가까운 곳에 있는 사람</p>
        </button>
        <button class="mode-card" data-mode="opposite">
          <img src="images/opposite.png" alt="반대 성향">
          <strong>반대 성향</strong>
          <p>극과 극은 통한다</p>
        </button>
      </div>
    </div>

</body>
<script type="module" src="js/match.js"></script>
</body>
</html>
