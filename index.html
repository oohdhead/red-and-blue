<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 — RED&BLUE</title>
  <link rel="stylesheet" as="style" crossorigin 
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="landing-page">
  <nav class="navbar">
    <a href="index.html" class="nav-logo">
      <img src="images/rnb_logo.png" alt="RED&BLUE 로고" />
      <span class="nav-logo-text">RED&BLUE</span>
    </a>
    <button class="nav-profile-icon hidden" id="nav-profile-icon">👤</button>
  </nav>
  <main class="landing-page-wrap">
    <h1 class="title-message">정치 나침반으로 나를 측정하고<br/>비슷하거나 정반대인 사람을 만나보세요.</h1>
    <a href="auth.html" id="btn-login">로그인</button>
    <a href="auth.html?tab=signup" class = "btn-signup" id="btn-signup">회원가입</a>

    <section class="features-simple">
      <div class="feature-card-simple">
        <div class="feature-icon">❤️</div>
        <p>유사한 성향 또는 반대 성향,<br />원하는 방향으로 매칭합니다.</p>
      </div>
      <div class="feature-card-simple">
        <div class="feature-icon">💬</div>
        <p>매칭된 상대와 1:1 채팅으로<br />서로의 이야기를 나눠보세요.</p>
      </div>
    </section>
  </main>
  <footer class="footer-simple">
    <span>RED&BLUE © 2026</span><br />
    <span>web programming final task</span>
  </footer>
  <div class="profile-modal-overlay hidden" id="profile-modal-overlay">
    <div class="profile-modal">
      <button class="modal-close" id="modal-close">✕</button>
      <div class="profile-modal-avatar" id="modal-avatar">?</div>
      <div class="profile-modal-name" id="modal-nickname">닉네임</div>
      <div class="form-group">
        <label>닉네임</label>
        <input type="text" id="modal-edit-nickname" />
      </div>
      <div class="form-group">
        <label>나이</label>
        <input type="number" id="modal-edit-age" />
      </div>
      <div class="form-group">
        <label>성별</label>
        <select id="modal-edit-gender">
          <option value="male">남성</option>
          <option value="female">여성</option>
          <option value="other">기타</option>
        </select>
      </div>
      <div class="form-group">
        <label>한줄소개</label>
        <input type="text" id="modal-edit-bio" />
      </div>
      <button class="btn-primary full" id="modal-btn-save">저장하기</button>
      <button class="btn-outline full" id="modal-btn-logout">로그아웃</button>
    </div>
  </div>

  <script type="module" src="js/index.js"></script>
</body>
</html>
