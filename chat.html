<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>채팅 — RED&BLUE</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="/rnb_logo.ico">
</head>
<body class="chat-page">

  <nav class="navbar chat-navbar">
    <span class="chat-partner-name" id="partner-name">상대방</span>
  </nav>

  <main class="chat-messages" id="chat-messages"></main>

  <div class="chat-input-bar">
    <input type="text" id="chat-input" placeholder="메시지를 입력하세요..." autocomplete="off" />
    <button class="btn-primary" id="btn-send">전송</button>
  </div>

  <div class="profile-modal-overlay hidden" id="profile-modal-overlay">
    <div class="profile-modal">
      <button class="modal-close" id="modal-close">✕</button>
      <div class="profile-modal-avatar" id="modal-avatar">?</div>
      <div class="profile-modal-name" id="modal-nickname">닉네임</div>
      <div class="form-group">
        <label>닉네임</label>
        <input type="text" id="modal-edit-nickname" />
      </div>
      <div class="form-group">
        <label>나이</label>
        <input type="number" id="modal-edit-age" />
      </div>
      <div class="form-group">
        <label>성별</label>
        <select id="modal-edit-gender">
          <option value="male">남성</option>
          <option value="female">여성</option>
          <option value="other">기타</option>
        </select>
      </div>
      <div class="form-group">
        <label>한줄소개</label>
        <input type="text" id="modal-edit-bio" />
      </div>
      <button class="btn-primary full" id="modal-btn-save">저장하기</button>
      <button class="btn-outline full" id="modal-btn-logout">로그아웃</button>
    </div>
  </div>

  <script type="module" src="js/chat.js"></script>
</body>
</html>
