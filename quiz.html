<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RED&BLUE</title>
  <link rel="icon" href="/rnb_logo.ico">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="quiz-page">
    <main class="quiz-page-wrap">
    <div class="quiz-head">
      <h1 class="quiz-main-title">당신의 성향을 알아보자!</h1>
      <p class="quiz-main-sub">정치 나침반으로 나를 측정하고<br/>비슷하거나 정반대인 사람을 만나보세요.</p>
    </div>
    <div class="quiz-sheet" id="quiz-sheet">
    </div>
 
    <div class="quiz-submit-row">
      <button class="btn-primary" id="btn-submit">결과 보기</a>
      <p class="quiz-warning hidden" id="quiz-warning">모든 문항에 응답해주세요.</p>
    </div>
  </main>
 
  <div class="profile-modal-overlay hidden" id="profile-modal-overlay">
    <div class="profile-modal">
      <button class="modal-close" id="modal-close">✕</button>
      <div class="profile-modal-avatar" id="modal-avatar">?</div>
      <div class="profile-modal-name" id="modal-nickname">닉네임</div>
      <div class="form-group">
        <label>닉네임</label>
        <input type="text" id="modal-edit-nickname" />
      </div>
      <div class="form-group">
        <label>나이</label>
        <input type="number" id="modal-edit-age" />
      </div>
      <div class="form-group">
        <label>성별</label>
        <select id="modal-edit-gender">
          <option value="male">남성</option>
          <option value="female">여성</option>
          <option value="other">기타</option>
        </select>
      </div>
      <div class="form-group">
        <label>한줄소개</label>
        <input type="text" id="modal-edit-bio" />
      </div>
      <button class="btn-primary full" id="modal-btn-save">저장하기</button>
      <button class="btn-outline full" id="modal-btn-logout">로그아웃</button>
    </div>
  </div>

  <script type="module" src="js/quiz.js"></script>
</body>
</html>
